name: Release non-production pipeline
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Target Version (e.g., v1.0.1-rc1)'
        required: true

jobs:
  pre-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment: release-gate-dev
    steps:
      - uses: actions/checkout@v5
        with: { ref: 'develop' }
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      - name: Create RC Tag
        run: |
          git tag ${{ github.event.inputs.version }}
          git push origin v${{ github.event.inputs.version }}

      - name: Notify Staging Deployment
        run: echo "RC1 created. ArgoCD will now sync to Pre-Prod."
                